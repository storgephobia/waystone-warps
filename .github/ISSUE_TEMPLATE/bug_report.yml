name: 🐛 Bug Report
description: Report a bug to help us improve.
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: 📖 Bug Description
      placeholder: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 🛠️ Steps to Reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 📉 Expected Behavior
      placeholder: What you expected to happen.
  - type: textarea
    id: actual
    attributes:
      label: 🚨 Actual Behavior
      placeholder: What actually happened. Include error logs or stack traces if available.
  - type: textarea
    id: screenshots
    attributes:
      label: 📸 Screenshots
      placeholder: If applicable, add screenshots to help explain your problem.
  - type: textarea
    id: environment
    attributes:
      label: 💻 Environment
      value: |
        - **OS:** [e.g. iOS, Windows]
        - **Browser/Version:** [e.g. Chrome 124, Safari]
        - **App Version:** [e.g. v1.2.3]
  - type: textarea
    id: fix
    attributes:
      label: 💡 Possible Fix
      placeholder: (Optional) If you have an idea of where the issue lies.
  - type: checkboxes
    id: checklist
    attributes:
      label: 🏁 Checklist
      options:
        - label: I have checked existing issues to ensure this hasn't been reported before.
          required: true
        - label: I have isolated this bug by testing in a clean environment.
          required: true
        - label: I am running a supported version of the software.
          required: true
